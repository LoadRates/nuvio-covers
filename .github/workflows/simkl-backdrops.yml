name: Simkl Backdrops

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Generate still backdrops
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_ACCESS_TOKEN: ${{ secrets.SIMKL_ACCESS_TOKEN }}
        run: python3 -B scripts/simkl_backdrop.py

      - name: Generate animated backdrops
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_ACCESS_TOKEN: ${{ secrets.SIMKL_ACCESS_TOKEN }}
        run: python3 -B scripts/simkl_animated_backdrop.py

      - name: Commit updated outputs
        id: publish
        run: |
          if ! git status --porcelain -- backdrops/ videos/ | grep -q .; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backdrops/watchlist.webp backdrops/plantowatch.webp \
                  videos/watchlist.mp4 videos/plantowatch.mp4
          git commit -m "chore: refresh Simkl backdrops"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        run: |
          for url in \
            "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/backdrops/watchlist.webp" \
            "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/backdrops/plantowatch.webp" \
            "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/videos/watchlist.mp4" \
            "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/videos/plantowatch.mp4"; do
            curl -s "$url" || true
            sleep 2
          done
