name: Simkl Backdrops

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Generate backdrops
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_ACCESS_TOKEN: ${{ secrets.SIMKL_ACCESS_TOKEN }}
        run: python3 -B scripts/simkl_backdrop.py

      - name: Commit updated backdrops
        id: publish
        run: |
          if git diff --quiet -- backdrops/; then
            echo "No changes to backdrop files."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backdrops/watchlist.webp backdrops/plantowatch.webp
          git commit -m "chore: refresh Simkl backdrops"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.publish.outputs.changed == 'true'
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/backdrops/watchlist.webp"
          curl -sf "https://purge.jsdelivr.net/gh/LoadRates/nuvio-covers@main/backdrops/plantowatch.webp"
